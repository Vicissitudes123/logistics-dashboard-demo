  function calculateQuote(){const mode=$('#qMode').value,load=$('#qLoad').value,cargo=$('#qCargo').value,dest=$('#qDest').value,weight=+$('#qWeight').value,volume=+$('#qVolume').value,containers=+$('#qContainers').value,fees=$('#qFees').value==='yes',route=`SHA→${dest}`,res=$('#quoteResult');if(!weight||weight<=0||!volume||volume<=0){res.innerHTML='<h4 style="color:#b55550">无法测算</h4><small>实际重量和体积必须为有效正数。</small>';return}const candidates=quoteRows.filter(q=>q.route===route&&q.mode===mode&&q.load===load&&q.cargo===cargo);if(!candidates.length){res.innerHTML=`<h4 style="color:#b55550">没有匹配报价</h4><small>${route} · ${mode==='AIR'?'空运':'海运'} · ${load} · ${cargo} 在演示价目表中无记录，因此不输出推荐金额。</small>`;return}let basis;if(mode==='AIR')basis=Math.max(weight,volume*167);else if(load==='LCL')basis=Math.max(1,volume);else{if(!containers||containers<1){res.innerHTML='<h4 style="color:#b55550">无法测算</h4><small>FCL模式必须填写有效柜量。</small>';return}basis=containers}const ranked=candidates.map(q=>{const freight=basis*q.rate,total=freight+(fees?q.fees:0);return {...q,freight,total}}),minTotal=Math.min(...ranked.map(q=>q.total)),minDays=Math.min(...ranked.map(q=>q.days));ranked.forEach(q=>q.score=round(minTotal/q.total*45+minDays/q.days*25+q.ontime/100*20+q.ontime/100*10,1));ranked.sort((a,b)=>b.score-a.score||a.total-b.total);const q=ranked[0];res.innerHTML=`<h4>综合推荐 · ${q.vendor}</h4><div class="resultGrid"><div><small>计价基础</small><b>${fmt(basis,1)} ${mode==='AIR'?'kg':load==='LCL'?'CBM':'柜'}</b></div><div><small>含选定杂费总价</small><b>¥${fmt(q.total,2)}</b></div><div><small>历史准时率</small><b>${q.ontime}%</b></div><div><small>综合评分</small><b>${q.score}</b></div></div><div class="callout" style="margin-top:10px"><b>推荐依据</b>总价45%＋时效25%＋稳定性20%＋服务10%；不是只选择最低基础运价。</div>${ranked.length>1?`<small style="display:block;margin-top:8px">备选：${ranked.slice(1).map(x=>`${x.vendor}（¥${fmt(x.total,0)} / ${x.score}分）`).join('；')}</small>`:''}`}
  function addWorkdays(date,days){const d=new Date(`${date}T12:00:00`);let n=0;while(n<days){d.setDate(d.getDate()+1);if(d.getDay()!==0&&d.getDay()!==6)n++}return d}function dateISO(d){return d.toISOString().slice(0,10)}
  const exportPages=[['import','进口看板'],['export','出口看板'],['domestic','国内运输'],['cost','成本分析'],['legal','法检资料'],['quote','运费比价']];
  function renderExportList(){const box=$('#exportList');box.innerHTML=exportPages.map(([p,n],i)=>{const current=tabs[p]?.find(x=>x[0]===state.tab[p])?.[1]||'当前页面',count=tabs[p]?.length||1;return `<div class="exportItem" data-export-page="${p}"><input type="checkbox" checked aria-label="选择${n}"><div><b>${i+1}. ${n}</b><small>采用当前全局筛选条件</small><div class="exportScope"><label for="scope-${p}">导出范围</label><select id="scope-${p}" data-export-scope><option value="current">当前子页面：${current}</option><option value="all">板块全部子页面（${count}页）</option></select></div></div><div class="moveBtns"><button data-move="up" title="上移">↑</button><button data-move="down" title="下移">↓</button></div></div>`}).join('');updateExportCount()}
  function exportTasks(){return $$('.exportItem',$('#exportList')).filter(x=>$('input',x).checked).flatMap(x=>{const page=x.dataset.exportPage,scope=$('[data-export-scope]',x)?.value||'current';if(scope==='all'&&tabs[page])return tabs[page].map(([tab,label])=>({page,tab,label}));const tab=state.tab[page],label=tabs[page]?.find(x=>x[0]===tab)?.[1]||meta[page][0];return [{page,tab,label}]})}
  function updateExportCount(){const all=$$('.exportItem',$('#exportList')),chosen=all.filter(x=>$('input',x).checked),tasks=exportTasks();$('#exportCount').textContent=`已选择 ${chosen.length}/${all.length} 个板块 · 共 ${tasks.length} 个页面`;$('#generatePdf').disabled=!chosen.length}
  $('#pdfBtn').onclick=()=>{$('#pdfModal').classList.add('open');renderExportList()};$('#pdfClose').onclick=()=>$('#pdfModal').classList.remove('open');$('#pdfModal').onclick=e=>{if(e.target===$('#pdfModal'))$('#pdfModal').classList.remove('open')};$('#pdfAll').onclick=()=>{$$('#exportList input').forEach(x=>x.checked=true);updateExportCount()};$('#pdfNone').onclick=()=>{$$('#exportList input').forEach(x=>x.checked=false);updateExportCount()};$('#exportList').onchange=updateExportCount;$('#exportList').onclick=e=>{const b=e.target.closest('[data-move]');if(!b)return;const item=b.closest('.exportItem'),dir=b.dataset.move;if(dir==='up'&&item.previousElementSibling)item.parentElement.insertBefore(item,item.previousElementSibling);if(dir==='down'&&item.nextElementSibling)item.parentElement.insertBefore(item.nextElementSibling,item);$$('.exportItem',$('#exportList')).forEach((x,i)=>$('b',x).textContent=`${i+1}. ${meta[x.dataset.exportPage][0]}`)};
  $('#generatePdf').onclick=generatePDF;
  async function generatePDF(){const tasks=exportTasks();if(!tasks.length)return;if(!window.html2canvas||!window.jspdf){toast('PDF组件尚未加载，请刷新后重试',true);return}$('#pdfModal').classList.remove('open');$('#exportMask').classList.add('open');const oldPage=state.page,oldTabs={...state.tab},oldScroll=scrollY;state.exporting=true;try{const {jsPDF}=window.jspdf,pdf=new jsPDF({orientation:'landscape',unit:'mm',format:'a4'});for(let i=0;i<tasks.length;i++){const {page,tab,label}=tasks[i];state.tab[page]=tab;$('#exportStatus').textContent=`正在生成 ${meta[page][0]} · ${label}（${i+1}/${tasks.length}）…`;switchPage(page,false);await wait(900);const target=$('#dashboard'),canvas=await html2canvas(target,{scale:1.35,useCORS:true,allowTaint:false,backgroundColor:'#edf2f3',logging:false,windowWidth:Math.max(1440,target.scrollWidth)});const pageW=277,pageH=190,ratio=canvas.width/pageW,slicePx=Math.floor(pageH*ratio);let y=0,pageNo=0;while(y<canvas.height){if(i||pageNo)pdf.addPage('a4','landscape');const h=Math.min(slicePx,canvas.height-y),crop=document.createElement('canvas');crop.width=canvas.width;crop.height=h;crop.getContext('2d').drawImage(canvas,0,y,canvas.width,h,0,0,canvas.width,h);pdf.setFontSize(9);pdf.setTextColor(45,72,84);pdf.text(`Logistics Dashboard | data through ${dataAsOf} | demo data`,10,7);pdf.addImage(crop.toDataURL('image/jpeg',.9),'JPEG',10,10,pageW,h/ratio);y+=h;pageNo++}}pdf.save(`物流部看板_${new Date().toISOString().slice(0,10)}.pdf`);toast('PDF 已生成并开始下载')}catch(err){console.error(err);toast('PDF生成失败，请刷新后重试',true)}finally{state.exporting=false;state.tab={...oldTabs};switchPage(oldPage,false);scrollTo(0,oldScroll);$('#exportMask').classList.remove('open')}}
  const wait=ms=>new Promise(r=>setTimeout(r,ms));
  render();
});
