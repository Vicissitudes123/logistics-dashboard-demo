    <div class="grid2">${panel('月度成本趋势','不同年份独立曲线；2026 不补齐缺失月份',lineChart(series),legend(series))}${panel('年度核心指标','2026 为 1—6 月累计',`<div class="matrix">${annual.map(a=>`<div><b>${a.y}</b><small>成本 ${compact(a.cost)}</small><br><small>票数 ${fmt(a.tickets)}</small><br><small>净重 ${compact(a.weight)}kg</small></div>`).join('')}</div><div style="margin-top:18px">${rank(annual.map(a=>[String(a.y),Math.round(a.cost/1000)]))}</div>`)}</div>
    <div class="gridEqual">${panel('票数比较','按年、按月并列，悬停显示数值',groupedBars([...state.years].sort().map((y,i)=>({name:String(y),values:costMetric(mode,y,'tickets'),color:colors[i]})),months),legend([...state.years].sort().map((y,i)=>({name:String(y),color:colors[i]}))))}${panel('单位成本比较','费用 / 净重；极端值应进一步下钻原因',lineChart([...state.years].sort().map((y,i)=>({name:String(y),values:costMetric(mode,y,'unit'),color:colors[i]}))),legend([...state.years].sort().map((y,i)=>({name:String(y),color:colors[i]}))))}</div>${costDetail(annual)}`}
  function renderLegal(){return `${intro('法检资料查询与状态管理','资料查询、产品基础信息与规则口径集中管理；本页明细含少量演示状态。','现有法检页面 + 演示状态',true)}
    <div class="kpis">${kpi('法检资料条目','500+','产品 / 单据 / 代码','持续更新','#249891',false,86)}${kpi('产品基础资料','41','含 HS Code / 密度','完整','#4f85bd',false,80)}${kpi('IATA 代码','5','E1—E5','有效','#7c74bd',false,72)}${kpi('待审核','9','单据列表','需处理','#f0b34c',false,35)}${kpi('资料完整率','96.8%','关键字段','+2.0 pt','#a8d764',false,96)}</div>
    <div class="grid2">${panel('资料处理状态','从待提交到审核完成',`<div class="timelineBoard">${[['待提交',12,'warn'],['待审核',9,'warn'],['补充资料',4,'warn'],['审核通过',47,'done'],['已归档',126,'done'],['失效提醒',3,'warn']].map(x=>`<div class="phase ${x[2]}"><b>${x[1]}</b><span>${x[0]}</span><small>条目</small></div>`).join('')}</div>`)}${panel('资料类型','明确类型和数量',donut([{name:'危包',value:196},{name:'IMI',value:89},{name:'产地证',value:57},{name:'商检',value:47}],'单证票数'))}</div>
    <div class="gridEqual">${panel('产品资料覆盖','关键字段覆盖率',rank([['HS Code',98],['中英文名',97],['密度',94],['IATA代码',91],['有效期',86]]))}${panel('规则速查','示例：IATA 包装代码',`<div class="matrix"><div><b>E1</b><small>单个内包装净含量限制</small></div><div><b>E2</b><small>30ml 级包装限制</small></div><div><b>E3</b><small>组合包装条件</small></div><div><b>E4 / E5</b><small>特殊限制与例外</small></div></div>`)}</div>${detailLab('legal',moduleRows.legal)}`}
  function renderQuote(){return `${intro('运费比价与供应商选择','把历史运价、代理报价、时效和推荐结果放在同一决策视图。','历史报价 + 演示代理报价',true)}
    <div class="kpis">${kpi('可比航线','18','空运 / 海运','+3 条','#249891',false,70)}${kpi('报价供应商','7','承运商 + 货代','已覆盖','#4f85bd',false,75)}${kpi('本期最低价','¥ 21.30/kg','SHA → BKK','-4.2%','#a8d764',true,52)}${kpi('平均节约','6.8%','相对第二报价','+1.1 pt','#f0b34c',false,66)}${kpi('待比价申请','1','CPT · G52145285','处理中','#7c74bd',false,28)}</div>
    <div class="grid2">${panel('历史运价走势','学习小工具：年份、月份和航线可组合筛选',lineChart([{name:'2024',values:[26.2,25.8,26.7,27.1,26.5,25.9,25.4,25.8,26.3,26.8,27.2,26.6],color:'#9ab2bd'},{name:'2025',values:[24.8,24.3,24.9,25.2,24.4,23.9,23.6,23.8,24.1,23.7,23.4,23.2],color:'#4f85bd'},{name:'2026',values:[23.5,23.1,22.8,22.4,21.9,21.3],color:'#249891'}]),legend([{name:'2024',color:'#9ab2bd'},{name:'2025',color:'#4f85bd'},{name:'2026',color:'#249891'}]))}${panel('报价决策','价格、时效、服务综合',rank([['东方航空',93],['南方航空',88],['货代A',84],['货代B',79],['货代C',72]]))}</div>
    <div class="gridEqual">${panel('报价构成','当前选中航线',donut([{name:'基础运价',value:18.4},{name:'燃油附加',value:3.2},{name:'操作费',value:1.1},{name:'其他',value:.5}],'¥/kg'))}${panel('推荐逻辑','让选择依据可解释',`<div class="timelineBoard" style="grid-template-columns:repeat(4,1fr)"><div class="phase done"><b>45%</b><span>总价</span><small>最低优先</small></div><div class="phase done"><b>25%</b><span>时效</span><small>承诺天数</small></div><div class="phase done"><b>20%</b><span>稳定性</span><small>历史履约</small></div><div class="phase warn"><b>10%</b><span>服务</span><small>异常响应</small></div></div>`)}</div>${detailLab('quote',moduleRows.quote)}`}
  function detailLab(page,rows){const defs=fieldDefs[page],selected=state.detail[page];return `<article class="card detailLab"><div class="labHead"><div><h3>明细与自定义对比</h3><p>自行选择需要并排查看的字段；表格只展示已选字段。</p></div><div class="microActions"><button class="btn tiny soft" data-detail-action="all" data-detail-page="${page}">一键全选</button><button class="btn tiny dangerSoft" data-detail-action="none" data-detail-page="${page}">一键全不选</button></div></div><div class="fieldChooser"><span class="label">对比字段</span>${Object.entries(defs).map(([k,v])=>`<button class="fieldChip ${selected.has(k)?'selected':''}" data-detail-field="${k}" data-detail-page="${page}">${v}</button>`).join('')}</div>${detailTable(page,rows)}</article>`}
  function detailTable(page,rows){const defs=fieldDefs[page],fields=[...state.detail[page]];if(!fields.length)return '<div class="empty">尚未选择字段。点击“一键全选”或选择需要对比的字段。</div>';return `<div class="tableWrap"><table><thead><tr>${fields.map(f=>`<th>${defs[f]}</th>`).join('')}</tr></thead><tbody>${rows.map(r=>`<tr>${fields.map(f=>{const v=r[f]??'—';return `<td>${['status','recommend'].includes(f)?badge(String(v)):typeof v==='number'?fmt(v,2):String(v).replace('*','<span class="demoMark">*</span>')}</td>`}).join('')}</tr>`).join('')}</tbody></table></div>`}
  function costDetail(annual){const rows=annual.map(a=>({year:a.y,scope:a.y===2026?'1—6月':'1—12月',mode:state.costMode,tickets:a.tickets,weight:a.weight,cost:a.cost,unit:a.cost/(a.weight||1)}));const defs={year:'年份',scope:'数据范围',mode:'运输方式',tickets:'票数',weight:'净重(kg)',cost:'总成本(元)',unit:'单位成本(元/kg)'};if(!state.detail.cost)state.detail.cost=new Set(Object.keys(defs));const selected=state.detail.cost;return `<article class="card detailLab"><div class="labHead"><div><h3>年度成本明细与自定义对比</h3><p>2024、2025 为全年；2026 为 1—6 月累计。</p></div><div class="microActions"><button class="btn tiny soft" data-detail-action="all" data-detail-page="cost">一键全选</button><button class="btn tiny dangerSoft" data-detail-action="none" data-detail-page="cost">一键全不选</button></div></div><div class="fieldChooser"><span class="label">对比字段</span>${Object.entries(defs).map(([k,v])=>`<button class="fieldChip ${selected.has(k)?'selected':''}" data-detail-field="${k}" data-detail-page="cost">${v}</button>`).join('')}</div><div class="tableWrap"><table><thead><tr>${[...selected].map(f=>`<th>${defs[f]}</th>`).join('')}</tr></thead><tbody>${rows.map(r=>`<tr>${[...selected].map(f=>`<td>${typeof r[f]==='number'?fmt(r[f],2):r[f]}</td>`).join('')}</tr>`).join('')}</tbody></table></div></article>`}
  function renderFilters(){
    $('#yearChips').innerHTML=[2024,2025,2026].map(y=>`<button class="chip ${state.years.has(y)?'selected':''}" data-year="${y}">${y}</button>`).join('');
    $('#monthChips').innerHTML=months.map((m,i)=>`<button class="chip accent ${state.months.has(i)?'selected':''}" data-month="${i}">${m}</button>`).join('');
    $('#metricChips').innerHTML=Object.entries(metricNames).map(([k,v])=>`<button class="chip ${state.metrics.has(k)?'selected':''}" data-metric="${k}">${v}</button>`).join('');
    $('#selectionCount').textContent=`${state.years.size}年 · ${state.months.size}个月`;
    const ys=[...state.years].sort(),ms=[...state.months].sort((a,b)=>a-b),y=ys.at(-1)||2026;
    let txt='请在筛选设置中选择时间范围';if(ms.length){if(state.time==='month')txt=`单月：${y}-${String(ms.at(-1)+1).padStart(2,'0')}-01 至月末`;else if(state.time==='ytd')txt=`累计范围：${y}-01-01 至 ${y}-${String(ms.at(-1)+1).padStart(2,'0')}-${ms.at(-1)===1?'28':'30'}`;else txt=`自定义对比：${ys.join('、')} 年 · ${ms.map(i=>months[i]).join('、')}`;}$('#dateRange').textContent=txt;
  }
  function render(){renderFilters();const fn={overview:renderOverview,import:renderImport,export:renderExport,domestic:renderDomestic,cost:renderCost,legal:renderLegal,quote:renderQuote}[state.page];$('#dashboard').innerHTML=`<div class="page">${fn()}</div>`;bindTips();}
  function bindTips(){const tip=$('#chartTip');$$('.tipTarget').forEach(el=>{el.addEventListener('pointermove',e=>{tip.textContent=el.dataset.tip;tip.style.display='block';tip.style.left=e.clientX+'px';tip.style.top=e.clientY+'px'});el.addEventListener('pointerleave',()=>tip.style.display='none')})}
  function switchPage(page){state.page=page;const [title,eye]=pageMeta[page];$('#pageTitle').textContent=title;$('#eyebrow').textContent=eye;$$('#nav button[data-page]').forEach(b=>b.classList.toggle('active',b.dataset.page===page));$('#sidebar').classList.remove('mobileOpen');window.scrollTo({top:0,behavior:'smooth'});render()}
  $('#nav').onclick=e=>{const b=e.target.closest('[data-page]');if(b)switchPage(b.dataset.page)};
  $('#sideToggle').onclick=()=>document.body.classList.toggle('body-collapsed');$('#menuBtn').onclick=()=>$('#sidebar').classList.toggle('mobileOpen');
  $('#filterToggle').onclick=()=>{state.filterOpen=!state.filterOpen;$('#filterDrawer').classList.toggle('open',state.filterOpen)};
  $('#timeMode').onclick=e=>{const b=e.target.closest('[data-mode]');if(!b)return;state.time=b.dataset.mode;$$('#timeMode button').forEach(x=>x.classList.toggle('active',x===b));if(state.time==='month'){const max=Math.max(...state.months,5);state.months=new Set([max])}else if(state.time==='ytd'){const max=Math.max(...state.months,5);state.months=new Set(Array.from({length:max+1},(_,i)=>i))}render()};
  $('#filterDrawer').onclick=e=>{const b=e.target.closest('button');if(!b)return;if(b.dataset.year){const y=+b.dataset.year;state.years.has(y)?state.years.delete(y):state.years.add(y)}if(b.dataset.month!=null){const m=+b.dataset.month;if(state.time==='month')state.months=new Set([m]);else state.months.has(m)?state.months.delete(m):state.months.add(m)}if(b.dataset.metric){const m=b.dataset.metric;state.metrics.has(m)?state.metrics.delete(m):state.metrics.add(m)}const a=b.dataset.action;if(a==='years-all')state.years=new Set([2024,2025,2026]);if(a==='years-none')state.years.clear();if(a==='months-all')state.months=new Set(months.map((_,i)=>i));if(a==='months-none')state.months.clear();if(a==='metrics-all')state.metrics=new Set(Object.keys(metricNames));if(a==='metrics-none')state.metrics.clear();render()};
  $('#dashboard').onclick=e=>{const mode=e.target.closest('[data-costmode]');if(mode){state.costMode=mode.dataset.costmode;render();return}const f=e.target.closest('[data-detail-field]');if(f){const p=f.dataset.detailPage,k=f.dataset.detailField;if(!state.detail[p])state.detail[p]=new Set();state.detail[p].has(k)?state.detail[p].delete(k):state.detail[p].add(k);render();return}const a=e.target.closest('[data-detail-action]');if(a){const p=a.dataset.detailPage;if(p==='cost'){const keys=['year','scope','mode','tickets','weight','cost','unit'];state.detail.cost=a.dataset.detailAction==='all'?new Set(keys):new Set()}else state.detail[p]=a.dataset.detailAction==='all'?new Set(Object.keys(fieldDefs[p])):new Set();render()}};
  $('#printBtn').onclick=()=>window.print();$('#exportBtn').onclick=()=>{const rows=moduleRows[state.page]||moduleRows.import;const data=JSON.stringify(rows,null,2),blob=new Blob([data],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`物流部看板-${pageMeta[state.page][0]}-明细.json`;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),500)};
  render();
})();
</script>
</body>
</html>
