  function renderLegal(){const tab=state.tab.legal;let body='';if(tab==='summary')body=`${selectedKpis([{metric:'tickets',args:['资料条目','500+','产品/单据/代码','持续更新','#278f8b',false,86]},{metric:'ontime',args:['资料完整率','96.8%','关键必填字段','+2.0 pt','#a7d45f',false,96]},{metric:'abnormal',args:['待审核/补充','13','需处理','-3项','#eba942',true,32]}])}<div class="grid2">${panel('处理状态','从申请到文件归档',`<div class="timelineBoard">${[['待提交',12,'warn'],['待审核',9,'warn'],['补充资料',4,'warn'],['审核通过',47,'done'],['文件生成',45,'done'],['已归档',126,'done']].map(x=>`<div class="phase ${x[2]}"><b>${x[1]}</b><span>${x[0]}</span><small>条目</small></div>`).join('')}</div>`)}${panel('资料类型','法检单证结构',donut([{name:'危包',value:196},{name:'IMI',value:89},{name:'产地证',value:57},{name:'商检',value:47}],'389票'))}</div>`;if(tab==='generate')body=`<div class="grid2">${panel('创建法检文件包','基础信息填写后生成样板预览',`<div class="formGrid"><div class="formField"><label>单据号</label><input id="docWaybill" value="20260716_AIR_US_01"></div><div class="formField"><label>产品</label><select id="docProduct"><option>丁酸乙酯</option><option>FRAGRANCE B003</option></select></div><div class="formField"><label>运输方式</label><select id="docMode"><option>空运</option><option>海运</option></select></div><div class="formField"><label>目的国</label><input id="docCountry" value="美国"></div></div><button class="btn primary" id="generateDocs" style="margin-top:12px">检查并生成文件包</button><div id="docResult" class="resultBox"><h4>尚未生成</h4><small>系统会先检查HS Code、密度、IATA代码和有效期等必填字段。</small></div>`)}${panel('生成流程','缺失字段不能静默跳过',`<div class="timelineBoard" style="grid-template-columns:repeat(4,1fr)"><div class="phase done"><b>1</b><span>基础信息</span><small>自动带出</small></div><div class="phase warn"><b>2</b><span>字段校验</span><small>阻断缺失项</small></div><div class="phase"><b>3</b><span>文件预览</span><small>版本确认</small></div><div class="phase"><b>4</b><span>审核归档</span><small>保留记录</small></div></div>`)}</div>`;if(tab==='library')body=`<div class="gridEqual">${panel('产品资料覆盖','长期维护的基础数据',rank([['HS Code',98],['中英文名',97],['密度',94],['IATA代码',91],['有效期',86]]))}${panel('IATA规则速查','示例规则库',`<div class="matrix"><div><b>E1</b><small>内包装限制</small></div><div><b>E2</b><small>30ml级限制</small></div><div><b>E3</b><small>组合包装</small></div><div><b>E4/E5</b><small>特殊限制</small></div></div>`)}</div>${detailLab('legal',rows.legal)}`;return `${intro('法检资料与文件生成','从资料查询扩展为可校验、生成、审核和归档的业务流程。','现有资料 + 功能样板',true)}${subnav('legal')}${body}`}
  function renderQuote(){const tab=state.tab.quote;let body='';if(tab==='summary')body=`${selectedKpis([{metric:'tickets',args:['可比航线','18','空运/海运','+3条','#278f8b',false,70]},{metric:'cost',args:['本期最低价','¥21.30/kg','SHA→BKK','-4.2%','#a7d45f',true,52]},{metric:'unit',args:['平均节约','6.8%','相对第二报价','+1.1 pt','#eba942',false,66]},{metric:'ontime',args:['推荐方准时率','96.2%','历史履约','+0.9 pt','#4d82b7',false,94]}])}<div class="grid2">${trendPanel('quote','unit','历史运价走势')}${panel('供应商综合评分','价格、时效、稳定性和服务',rank([['东方航空',93],['南方航空',88],['货代A',84],['货代B',79]]))}</div>${detailLab('quote',rows.quote)}`;if(tab==='calculator')body=`<div class="grid2">${panel('报价测算','FCL/LCL、DG/NDG、目的地和港杂费校验',`<div class="formGrid"><div class="formField"><label>运输方式</label><select id="qMode"><option>空运</option><option>海运</option></select></div><div class="formField"><label>装载类型</label><select id="qLoad"><option>LCL</option><option>FCL</option></select></div><div class="formField"><label>货物类型</label><select id="qCargo"><option>DG</option><option>NDG</option></select></div><div class="formField"><label>目的地</label><select id="qDest"><option>BKK</option><option>NRT</option><option>SYD</option></select></div><div class="formField"><label>重量 kg</label><input id="qWeight" type="number" value="850"></div><div class="formField"><label>基础运价 元/kg</label><input id="qBase" type="number" step=".01" value="18.4"></div><div class="formField"><label>包含港杂费</label><select id="qPortYes"><option value="yes">Yes</option><option value="no">No</option></select></div><div class="formField"><label>港杂费 元</label><input id="qPort" type="number" value="3200"></div></div><button class="btn primary" id="calcQuote" style="margin-top:12px">测算并校验</button><div id="quoteResult" class="resultBox"><h4>等待测算</h4><small>缺少目的地报价或选择Yes但未填写港杂费时，系统会明确提示。</small></div>`)}${panel('报价匹配规则','避免缺少数据仍计算出金额',`<div class="callout"><b>计算逻辑</b>LCL按目的地、重量和DG/NDG匹配；FCL按整柜报价并单独校验港杂费。</div><div class="callout bad" style="margin-top:9px"><b>阻断条件</b>目的地无报价、港杂费Yes但金额为空、重量无效时，不输出推荐结果。</div>`)}</div>`;if(tab==='history')body=`<div class="grid2">${panel('历史履约','运价与准时率共同决策',groupedBars([{name:'准时率%',values:[96.2,94.8,97.1,92.5],color:colors[0]}],['东航','南航','货代A','货代B'],'%'))}${panel('推荐权重','选择依据可解释',donut([{name:'总价',value:45},{name:'时效',value:25},{name:'稳定性',value:20},{name:'服务',value:10}],'权重'))}</div>${detailLab('quote',rows.quote)}`;return `${intro('运费比价与供应商选择','历史价格、真实测算规则和供应商履约放在同一决策链。','历史数据 + 功能样板',true)}${subnav('quote')}${body}`}
  function renderFilters(){
    $('#yearChips').innerHTML=[2024,2025,2026].map(y=>`<button class="chip ${state.years.has(y)?'selected':''}" data-year="${y}">${y}</button>`).join('');
    $('#monthChips').innerHTML=months.map((m,i)=>`<button class="chip accent ${state.months.has(i)?'selected':''}" data-month="${i}">${m}</button>`).join('');
    $('#metricChips').innerHTML=Object.entries(metricNames).map(([k,v])=>`<button class="chip ${state.metrics.has(k)?'selected':''}" data-metric="${k}">${v}</button>`).join('');
    $('#selectionCount').textContent=`${state.years.size}年 · ${state.months.size}月 · ${state.metrics.size}指标 `;
    const ys=[...state.years].sort(),ms=[...state.months].sort((a,b)=>a-b),latest=ys.at(-1)||2026,last=ms.at(-1);let txt='请至少选择一个年份和月份';if(last!=null&&ys.length){if(state.time==='month')txt=`单月：${ys.join('、')}年 ${months[last]}`;else if(state.time==='ytd')txt=`累计（YTD）：${ys.join('、')}年 1月至${months[last]}`;else txt=`自定义对比：${ys.join('、')}年 · ${ms.map(i=>months[i]).join('、')}`;if(latest===2026&&last>5)txt+='（2026年7月后暂无成本数据）'}$('#dateRange').textContent=txt;
  }
  function render(){renderFilters();const fn={overview:renderOverview,import:renderImport,export:renderExport,domestic:renderDomestic,cost:renderCost,legal:renderLegal,quote:renderQuote}[state.page];$('#dashboard').innerHTML=`<div class="page">${fn()}</div>`;bindTips()}
  function bindTips(){const tip=$('#chartTip');$$('.tipTarget').forEach(el=>{el.addEventListener('pointermove',e=>{tip.textContent=el.dataset.tip;tip.style.display='block';tip.style.left=e.clientX+'px';tip.style.top=e.clientY+'px'});el.addEventListener('pointerleave',()=>tip.style.display='none')})}
  function switchPage(page){state.page=page;const [title,eye]=pageMeta[page];$('#pageTitle').textContent=title;$('#eyebrow').textContent=eye;$$('#nav button[data-page]').forEach(b=>b.classList.toggle('active',b.dataset.page===page));$('#sidebar').classList.remove('mobileOpen');window.scrollTo({top:0,behavior:'smooth'});render()}
  function openColumnFilter(btn){const page=btn.dataset.filterPage,key=btn.dataset.colFilter,source=page==='cost'?costRows():rows[page],defs=fieldDefs[page],vals=[...new Set(source.map(r=>String(r[key]??'—')))].sort(),active=state.colFilters[page]?.[key]||new Set(),typed=state.textFilters[page]?.[key]||'';const pop=$('#filterPopover'),rect=btn.getBoundingClientRect();pop.dataset.page=page;pop.dataset.key=key;pop.innerHTML=`<b>${defs[key]}筛选</b><label class="filterHint">直接输入（包含）</label><input class="filterSearch" id="filterCondition" value="${typed.replace(/"/g,'&quot;')}" placeholder="例如：2026-06、海运、货代A"><label class="filterHint">或从已有值选择</label><input class="filterSearch" id="filterSearch" placeholder="搜索下方选项"><div class="filterActions"><button class="pickBtn" data-pop-action="all">全选</button><button class="pickBtn clear" data-pop-action="none">全不选</button></div><div class="filterValues">${vals.map(v=>`<label class="filterValue" data-value-row="${v.toLowerCase()}"><input type="checkbox" value="${v.replace(/"/g,'&quot;')}" ${!active.size||active.has(v)?'checked':''}> <span>${v}</span></label>`).join('')}</div><div class="filterFoot"><button class="btn tiny" data-pop-action="cancel">取消</button><button class="btn tiny primary" data-pop-action="apply">应用</button></div>`;pop.classList.add('open');const width=280,left=Math.min(innerWidth-width-10,Math.max(10,rect.right-width));pop.style.left=left+'px';pop.style.top=Math.min(innerHeight-430,rect.bottom+5)+'px';$('#filterCondition').focus()}
  $('#nav').onclick=e=>{const b=e.target.closest('[data-page]');if(b)switchPage(b.dataset.page)};
  $('#sideToggle').onclick=()=>document.body.classList.toggle('body-collapsed');$('#menuBtn').onclick=()=>$('#sidebar').classList.toggle('mobileOpen');
  $('#filterToggle').onclick=()=>{state.filterOpen=!state.filterOpen;$('#filterDrawer').classList.toggle('open',state.filterOpen)};
  $('#timeMode').onclick=e=>{const b=e.target.closest('[data-mode]');if(!b)return;state.time=b.dataset.mode;$$('#timeMode button').forEach(x=>x.classList.toggle('active',x===b));const max=state.months.size?Math.max(...state.months):5;if(state.time==='month')state.months=new Set([max]);if(state.time==='ytd')state.months=new Set(Array.from({length:max+1},(_,i)=>i));render()};
  $('#filterDrawer').onclick=e=>{const b=e.target.closest('button');if(!b)return;if(b.dataset.year){const y=+b.dataset.year;state.years.has(y)?state.years.delete(y):state.years.add(y)}if(b.dataset.month!=null){const m=+b.dataset.month;if(state.time==='month')state.months=new Set([m]);else state.months.has(m)?state.months.delete(m):state.months.add(m)}if(b.dataset.metric){const k=b.dataset.metric;state.metrics.has(k)?state.metrics.delete(k):state.metrics.add(k)}const a=b.dataset.action;if(a==='years-all')state.years=new Set([2024,2025,2026]);if(a==='years-none')state.years.clear();if(a==='months-all')state.months=new Set(months.map((_,i)=>i));if(a==='months-none')state.months.clear();if(a==='metrics-all')state.metrics=new Set(Object.keys(metricNames));if(a==='metrics-none')state.metrics.clear();render()};
  $('#dashboard').onclick=e=>{
    const tab=e.target.closest('[data-subtab]');if(tab){state.tab[tab.dataset.subpage]=tab.dataset.subtab;render();return}
    const mode=e.target.closest('[data-costmode]');if(mode){state.costMode=mode.dataset.costmode;render();return}
    const f=e.target.closest('[data-detail-field]');if(f){const p=f.dataset.detailPage,k=f.dataset.detailField;state.detail[p].has(k)?state.detail[p].delete(k):state.detail[p].add(k);render();return}
    const a=e.target.closest('[data-detail-action]');if(a){const p=a.dataset.detailPage;state.detail[p]=a.dataset.detailAction==='all'?new Set(Object.keys(fieldDefs[p])):new Set();render();return}
    const cf=e.target.closest('[data-col-filter]');if(cf){openColumnFilter(cf);return}
    const clear=e.target.closest('[data-clear-colfilters]');if(clear){state.colFilters[clear.dataset.clearColfilters]={};state.textFilters[clear.dataset.clearColfilters]={};render();return}
    if(e.target.closest('#calcQuote')){const weight=+$('#qWeight').value,base=+$('#qBase').value,portYes=$('#qPortYes').value==='yes',port=+$('#qPort').value,load=$('#qLoad').value,cargo=$('#qCargo').value,dest=$('#qDest').value,res=$('#quoteResult');if(!weight||!base||portYes&&!port){res.innerHTML='<h4 style="color:#b55752">无法完成测算</h4><small>重量、基础运价必须有效；选择包含港杂费Yes时，港杂费金额不能为空。</small>';return}const handling=load==='FCL'?980:Math.max(380,weight*.65),danger=cargo==='DG'?weight*1.25:0,total=weight*base+(portYes?port:0)+handling+danger;res.innerHTML=`<h4>测算完成 · ${load}/${cargo}/${dest}</h4><div class="resultGrid"><div><small>基础运费</small><b>¥${fmt(weight*base,2)}</b></div><div><small>港杂费</small><b>¥${fmt(portYes?port:0,2)}</b></div><div><small>操作/危险品</small><b>¥${fmt(handling+danger,2)}</b></div><div><small>测算总价</small><b>¥${fmt(total,2)}</b></div></div>`;return}
    if(e.target.closest('#generateDocs')){const w=$('#docWaybill').value.trim(),c=$('#docCountry').value.trim(),res=$('#docResult');if(!w||!c){res.innerHTML='<h4 style="color:#b55752">缺少必填信息</h4><small>单据号和目的国不能为空。</small>';return}res.innerHTML=`<h4 style="color:#2b8067">文件包已生成（样板）</h4><div class="resultGrid"><div><small>单据号</small><b>${w}</b></div><div><small>字段校验</small><b>通过</b></div><div><small>文件数量</small><b>4份</b></div><div><small>版本</small><b>V1</b></div></div>`;return}
  };
  $('#filterPopover').addEventListener('input',e=>{if(e.target.id==='filterSearch'){const q=e.target.value.toLowerCase();$$('[data-value-row]',$('#filterPopover')).forEach(r=>r.style.display=r.dataset.valueRow.includes(q)?'flex':'none')}});
  $('#filterPopover').onclick=e=>{const a=e.target.closest('[data-pop-action]');if(!a)return;const pop=$('#filterPopover'),checks=$$('input[type=checkbox]',pop);if(a.dataset.popAction==='all')checks.forEach(c=>c.checked=true);if(a.dataset.popAction==='none')checks.forEach(c=>c.checked=false);if(a.dataset.popAction==='cancel'){pop.classList.remove('open');return}if(a.dataset.popAction==='apply'){const p=pop.dataset.page,k=pop.dataset.key,chosen=new Set(checks.filter(c=>c.checked).map(c=>c.value)),typed=$('#filterCondition').value.trim();if(!state.colFilters[p])state.colFilters[p]={};if(!state.textFilters[p])state.textFilters[p]={};state.colFilters[p][k]=chosen;state.textFilters[p][k]=typed;pop.classList.remove('open');render()}};
  document.addEventListener('pointerdown',e=>{const pop=$('#filterPopover');if(pop.classList.contains('open')&&!pop.contains(e.target)&&!e.target.closest('[data-col-filter]'))pop.classList.remove('open')});
  $('#printBtn').onclick=()=>window.print();$('#exportBtn').onclick=()=>{const source=state.page==='cost'?costRows():(rows[state.page]||rows.import),blob=new Blob([JSON.stringify(filteredRows(state.page,source),null,2)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`物流部看板-${pageMeta[state.page][0]}-明细.json`;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),500)};
  function addWorkdays(date,days){const d=new Date(date);let n=0;while(n<days){d.setDate(d.getDate()+1);if(d.getDay()!==0&&d.getDay()!==6)n++}return d}function dateISO(d){return d.toISOString().slice(0,10)}
  render();
})();
